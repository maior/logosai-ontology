# 🧠 온톨로지 LLM 설정 파일
# Ontology LLM Configuration File

# 제공업체별 설정
providers:
  openai:
    api_key_env: "OPENAI_API_KEY"
    description: "OpenAI GPT 모델들"
    models:
      high_performance: "gpt-4.1"
      standard: "gpt-4.1-mini"
      fast: "gpt-4.1-mini"
      creative: "gpt-4.1"
      budget: "gpt-4.1-mini"
    default_params:
      temperature: 0.7
      max_tokens: 3000
      top_p: 1.0
      frequency_penalty: 0.0
      presence_penalty: 0.0

  anthropic:
    api_key_env: "ANTHROPIC_API_KEY"
    description: "Anthropic Claude 모델들"
    models:
      high_performance: "claude-4-sonnet"
      standard: "claude-3.7-sonnet"
      fast: "claude-3.7-haiku"
      creative: "claude-4-sonnet"
      budget: "claude-3.7-haiku"
    default_params:
      temperature: 0.7
      max_tokens: 3000
      top_p: 1.0

  google:
    api_key_env: "GOOGLE_API_KEY"
    description: "Google Gemini 모델들"
    models:
      high_performance: "gemini-3-flash-preview"
      standard: "gemini-2.5-flash"
      fast: "gemini-2.5-flash-lite"
      creative: "gemini-3-flash-preview"
      budget: "gemini-2.5-flash-lite"
    default_params:
      temperature: 0.7
      max_tokens: 3000
      top_p: 1.0

# 사전 정의된 설정 프로파일
profiles:
  mixed_optimal:
    description: "각 작업에 최적화된 LLM 조합"
    settings:
      semantic_analyzer:
        provider: "anthropic"
        model_tier: "high_performance"
        reason: "sonnet 4가 의미 분석에 뛰어남"
      
      workflow_designer:
        provider: "openai"
        model_tier: "high_performance"
        reason: "GPT-4.1가 구조화에 뛰어남"
      
      knowledge_reasoner:
        provider: "google"
        model_tier: "high_performance"
        reason: "Gemini가 추론에 강함"
      
      result_integrator:
        provider: "anthropic"
        model_tier: "high_performance"
        reason: "Claude가 통합에 뛰어남"
      
      query_processor:
        provider: "google"
        model_tier: "fast"
        reason: "Gemini Flash가 빠름"
      
      graph_builder:
        provider: "openai"
        model_tier: "high_performance"
        reason: "GPT-4.1가 구조화에 뛰어남"
      
      performance_optimizer:
        provider: "google"
        model_tier: "fast"
        reason: "Gemini Flash가 빠르고 효율적"
      
      creative_reasoner:
        provider: "anthropic"
        model_tier: "creative"
        reason: "sonnet 4가 창의적 사고에 뛰어남"

  all_openai:
    description: "모든 LLM을 OpenAI로 설정"
    settings:
      semantic_analyzer: { provider: "openai", model_tier: "fast" }
      workflow_designer: { provider: "openai", model_tier: "fast" }
      knowledge_reasoner: { provider: "openai", model_tier: "fast" }
      result_integrator: { provider: "openai", model_tier: "fast" }
      query_processor: { provider: "openai", model_tier: "fast" }
      graph_builder: { provider: "openai", model_tier: "fast" }
      performance_optimizer: { provider: "openai", model_tier: "fast" }
      creative_reasoner: { provider: "openai", model_tier: "fast" }

  all_claude:
    description: "모든 LLM을 Claude로 설정"
    settings:
      semantic_analyzer: { provider: "anthropic", model_tier: "high_performance" }
      workflow_designer: { provider: "anthropic", model_tier: "high_performance" }
      knowledge_reasoner: { provider: "anthropic", model_tier: "high_performance" }
      result_integrator: { provider: "anthropic", model_tier: "high_performance" }
      query_processor: { provider: "anthropic", model_tier: "fast" }
      graph_builder: { provider: "anthropic", model_tier: "high_performance" }
      performance_optimizer: { provider: "anthropic", model_tier: "fast" }
      creative_reasoner: { provider: "anthropic", model_tier: "creative" }

  all_gemini:
    description: "모든 LLM을 Gemini로 설정 (핵심 분석은 2.5-flash, 나머지는 2.5-flash-lite)"
    settings:
      semantic_analyzer: { provider: "google", model_tier: "standard" }
      workflow_designer: { provider: "google", model_tier: "standard" }
      knowledge_reasoner: { provider: "google", model_tier: "budget" }
      result_integrator: { provider: "google", model_tier: "budget" }
      query_processor: { provider: "google", model_tier: "budget" }
      graph_builder: { provider: "google", model_tier: "budget" }
      performance_optimizer: { provider: "google", model_tier: "budget" }
      creative_reasoner: { provider: "google", model_tier: "budget" }

  budget_friendly:
    description: "비용 효율적인 설정"
    settings:
      semantic_analyzer: { provider: "openai", model_tier: "standard" }
      workflow_designer: { provider: "google", model_tier: "fast" }
      knowledge_reasoner: { provider: "google", model_tier: "fast" }
      result_integrator: { provider: "openai", model_tier: "standard" }
      query_processor: { provider: "google", model_tier: "fast" }
      graph_builder: { provider: "google", model_tier: "fast" }
      performance_optimizer: { provider: "google", model_tier: "fast" }
      creative_reasoner: { provider: "google", model_tier: "budget" }

  fallback_priority:
    description: "폴백 우선순위 설정 (API 키 존재 시)"
    settings:
      semantic_analyzer: { provider: "google", model_tier: "fast" }
      workflow_designer: { provider: "google", model_tier: "fast" }
      knowledge_reasoner: { provider: "google", model_tier: "fast" }
      result_integrator: { provider: "google", model_tier: "fast" }
      query_processor: { provider: "google", model_tier: "fast" }
      graph_builder: { provider: "google", model_tier: "fast" }
      performance_optimizer: { provider: "google", model_tier: "fast" }
      creative_reasoner: { provider: "google", model_tier: "fast" }

# 온톨로지 LLM 타입별 기본 설정
ontology_llm_defaults:
  semantic_analyzer:
    temperature: 0.3
    max_tokens: 3000
    top_p: 0.9
    description: "의미론적 분석 및 쿼리 이해 전용 LLM"
    use_case: "사용자 쿼리의 의도, 엔티티, 개념 추출"
    specialization: "semantic_analysis"
    reasoning_depth: "deep"
    creativity_level: "conservative"
    precision_level: "high"

  workflow_designer:
    temperature: 0.5
    max_tokens: 4000
    top_p: 0.95
    description: "워크플로우 설계 및 최적화 전용 LLM"
    use_case: "에이전트 선택, 실행 순서 결정, 최적화 전략 수립"
    specialization: "workflow_design"
    reasoning_depth: "deep"
    creativity_level: "balanced"
    precision_level: "high"

  knowledge_reasoner:
    temperature: 0.2
    max_tokens: 2500
    top_p: 0.8
    description: "지식 그래프 추론 및 관계 발견 전용 LLM"
    use_case: "개념 간 관계 추론, 지식 패턴 발견, 온톨로지 확장"
    specialization: "knowledge_reasoning"
    reasoning_depth: "deep"
    creativity_level: "conservative"
    precision_level: "high"

  result_integrator:
    temperature: 0.6
    max_tokens: 3500
    top_p: 0.95
    presence_penalty: 0.1
    description: "다중 에이전트 결과 통합 전용 LLM"
    use_case: "여러 에이전트 결과를 일관성 있게 통합"
    specialization: "result_integration"
    reasoning_depth: "standard"
    creativity_level: "balanced"
    precision_level: "high"

  query_processor:
    temperature: 0.4
    max_tokens: 2000
    request_timeout: 20
    description: "빠른 쿼리 처리 및 전처리 전용 LLM"
    use_case: "간단한 쿼리 분석, 전처리, 라우팅"
    specialization: "query_processing"
    reasoning_depth: "shallow"
    creativity_level: "conservative"
    precision_level: "medium"

  graph_builder:
    temperature: 0.4
    max_tokens: 3000
    top_p: 0.9
    description: "지식 그래프 구축 및 시각화 전용 LLM"
    use_case: "노드/엣지 생성, 그래프 구조 최적화, 시각화 데이터 생성"
    specialization: "graph_building"
    reasoning_depth: "standard"
    creativity_level: "conservative"
    precision_level: "high"

  performance_optimizer:
    temperature: 0.3
    max_tokens: 2500
    top_p: 0.85
    description: "성능 분석 및 최적화 전용 LLM"
    use_case: "병렬 처리 분석, 성능 예측, 리소스 최적화"
    specialization: "performance_optimization"
    reasoning_depth: "standard"
    creativity_level: "conservative"
    precision_level: "high"

  creative_reasoner:
    temperature: 0.8
    max_tokens: 3000
    top_p: 0.95
    presence_penalty: 0.2
    description: "창의적 문제 해결 및 대안 제시 전용 LLM"
    use_case: "창의적 워크플로우 설계, 혁신적 해결책 제시"
    specialization: "creative_reasoning"
    reasoning_depth: "deep"
    creativity_level: "creative"
    precision_level: "medium"

# 기본 설정
default_profile: "all_gemini"
config_version: "1.0"
last_updated: "2025-06-20" 